  <h1>競標區</h1>

</header>

  <div id="auction-list" class="product-grid"></div>

<footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
let countdownTimers = [];

function clearCountdownTimers() {
  countdownTimers.forEach(timer => clearInterval(timer));
  countdownTimers = [];
}

function startCountdown(auctionId, endTime) {
  const countdownElement = document.getElementById(`countdown-${auctionId}`);
  const button = document.getElementById(`button-${auctionId}`);
  const bidInput = document.getElementById(`bid-${auctionId}`);
  const nameInput = document.getElementById(`name-${auctionId}`);
  const lineInput = document.getElementById(`line-${auctionId}`);

  function update() {
    const now = new Date().getTime();
    const target = new Date(endTime).getTime();
    const distance = target - now;

    if (distance <= 0) {
      countdownElement.textContent = "🔴 已結標";

      button.disabled = true;
      button.textContent = "已結標";
      button.style.opacity = "0.5";
      button.style.cursor = "not-allowed";

      bidInput.disabled = true;
      nameInput.disabled = true;
      lineInput.disabled = true;

      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    countdownElement.textContent =
      `⏳ 剩餘時間：${days}天 ${hours}小時 ${minutes}分 ${seconds}秒`;
  }

  update();

  const timer = setInterval(update, 1000);
  countdownTimers.push(timer);
}

async function loadAuctions() {
  const container = document.getElementById("auction-list");

  clearCountdownTimers();
  container.innerHTML = "";

  const { data: auctions, error } = await supabaseClient
    .from("auctions")
    .select("*")
    .eq("is_active", true)
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    container.innerHTML = "<p>競標資料讀取失敗。</p>";
    return;
  }

  for (const auction of auctions) {
    const { data: bids } = await supabaseClient
      .from("bids")
      .select("*")
      .eq("auction_id", auction.id)
      .order("bid_amount", { ascending: false })
      .limit(1);

    const highestBid =
      bids && bids.length > 0
        ? bids[0].bid_amount
        : auction.starting_bid;

    container.innerHTML += `
      <div class="product-card auction-card">
        <img src="images/${auction.image_url}" alt="${auction.name}">

        <h3>${auction.name}</h3>

        <p>${auction.description || ""}</p>

        <p>目前最高價：NT$${highestBid}</p>

        <p>結標時間：${new Date(auction.end_time).toLocaleString("zh-TW")}</p>

        <p id="countdown-${auction.id}" class="bid-status">
          計算中...
        </p>

        <input id="name-${auction.id}" placeholder="你的真實姓名(必填)">

        <input id="line-${auction.id}" placeholder="你的 LINE ID(必填)">

        <input id="bid-${auction.id}" type="number" placeholder="出價金額(必填)">

        <button
          id="button-${auction.id}"
          onclick="placeBid(${auction.id}, ${highestBid}, '${auction.end_time}', '${auction.name.replace(/'/g, "\\'")}')">
          送出出價
        </button>

        <p id="status-${auction.id}" class="bid-status"></p>
      </div>
    `;

    startCountdown(auction.id, auction.end_time);
  }
}

async function placeBid(auctionId, currentHighestBid, endTime, auctionName) {
  const now = new Date().getTime();
  const target = new Date(endTime).getTime();
  const status = document.getElementById(`status-${auctionId}`);

  if (now >= target) {
    status.textContent = "競標已結束，不能再出價。";
    return;
  }

  const name = document.getElementById(`name-${auctionId}`).value.trim();
  const lineId = document.getElementById(`line-${auctionId}`).value.trim();
  const bidAmount = Number(document.getElementById(`bid-${auctionId}`).value);

  if (!name || !lineId || !bidAmount) {
    status.textContent = "❌ 請完整填寫姓名、LINE ID 和出價金額！";
    alert("🚨 填寫不完整！請務必留下您的姓名與 LINE ID 唷！");
    return;
  }

  if (lineId.length < 4) {
    status.textContent = "❌ LINE ID 格式不正確（太短）";
    alert("🚨 填寫失敗！請輸入正確的 LINE ID，字數過少將無法核對！");
    return;
  }

  const chineseRegex = /[\u4e00-\u9fa5]/;
  if (chineseRegex.test(lineId)) {
    status.textContent = "❌ LINE ID 不能含有中文字";
    alert("🚨 填寫失敗！LINE ID 不可能含有中文字，請填寫正確的 ID！");
    return;
  }

  if (bidAmount <= currentHighestBid) {
    status.textContent = "出價必須高於目前最高價";
    return;
  }

  const confirmBid = confirm(
    `📢 【 SparrowUPinkHen 出價確認 】\n\n` +
    `您確定要以 NT$ ${bidAmount} 進行競標嗎？\n` +
    `⚠️ 請注意：出價即代表購買意願。惡意棄單、亂填 LINE ID 聯絡不到人者，本店將直接公開黑名單並依法追究相關損失！`
  );
  
  if (!confirmBid) {
    status.textContent = "已取消出價";
    return;
  }

  const { error } = await supabaseClient
    .from("bids")
    .insert([
      {
        auction_id: auctionId,
        bidder_name: name,
        line_id: lineId,
        bid_amount: bidAmount
      }
    ]);

  if (error) {
    console.log(error);
    status.textContent = "出價失敗";
    return;
  }

  status.textContent = "出價成功！";

  // 🔔 修正後的 Discord 競標警報器（移除了會自我排擠的 bug 判斷式）
  const discordWebhookUrl = "https://discord.com/api/webhooks/1513961457518121101/dryBxbx0NsLfipbhNN4NIpeEnjv6wQM5V0RYjSB707y9p4eAoUhouGQXtbYRXpY7lhVK"; 
  
  const messageData = {
    username: "SparrowUPinkHen 拍賣官",
    content: `🚨 **【競標區有新出價啦！】** 🚨\n` +
             `🎴 **競標商品**: ${auctionName}\n` +
             `👤 **買家姓名**: ${name}\n` +
             `💬 **LINE ID**: ${lineId}\n` +
             `💰 **出價金額**: NT$ ${bidAmount}\n` +
             `⏰ **出價時間**: ${new Date().toLocaleString("zh-TW")}\n` +
             `-----------------------------------------`
  };

  fetch(discordWebhookUrl, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(messageData)
  }).catch(err => console.error("Discord 通知發送失敗:", err));

  setTimeout(() => {
    loadAuctions();
  }, 500);
}

loadAuctions();
</script>
