<body>

<header class="header">
  <nav class="navbar">
    <a href="index.html">首頁</a>
    <a href="gradedcard.html">鑑定卡區</a>

      <img src="images/cart-icon.png" alt="購物車">
      <span id="cart-count">0</span>
    </a>
  </nav>

 <h1>裸卡區</h1>
  <p class="slogan">Raw Cards Collection</p>
  <p class="notice" style="font-size: 1.1rem; color: #888; margin-top: 15px; font-weight: 500;">
    💡 <strong>卡況說明：</strong>全店裸卡均視為打牌卡。老闆純收藏不太會看卡況，有喜歡再購買喔！
  </p>
</header>
</header>

<section class="product">
  <div id="raw-list" class="product-grid"></div>
</section>

<footer>
  <p>© SparrowUPinkHen PTCG</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

function updateCartCount() {

  const cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  const count =
    document.getElementById("cart-count");

  if (count) {
    count.textContent = cart.length;
  }
}

function addToCart(card) {

  const cart =
    JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: card.name,
    description: card.description,
    price: card.price,
    image_url: card.image_url,
    type: "裸卡"
  });

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

  alert("已加入購物車！");
}

async function loadRawProducts() {

  const container =
    document.getElementById("raw-list");

  container.innerHTML = "";

  const { data, error } =
    await supabaseClient
      .from("raw_products")
      .select("*")
      .order("created_at", { ascending: false });

  if (error) {

    console.log(error);

    container.innerHTML =
      "<p>裸卡資料讀取失敗</p>";

    return;
  }

  window.rawCardsData = data;

  data.forEach((card, index) => {

    const priceHTML =
      card.price > 0
      ? `<strong>NT$${card.price}</strong>`
      : "";

    container.innerHTML += `
      <div class="product-card">

        <img
          src="images/${card.image_url}"
          alt="${card.name}">

        <h3>${card.name}</h3>

        <p>${card.description || ""}</p>

        ${priceHTML}

        <button
          class="add-cart-btn"
          onclick="addToCart(window.rawCardsData[${index}])">

          <img
            src="images/cart-icon.png"
            alt="加入購物車">

        </button>

      </div>
    `;
  });

  updateCartCount();
}

loadRawProducts();

</script>

</body>
</html>
