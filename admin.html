<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品後台 | SparrowUPinkHen PTCG</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

  <h1>商品後台</h1>
  <p class="slogan">Add New Graded Cards</p>

  <button
    onclick="logout()"
    style="
      padding:12px 25px;
      border:none;
      border-radius:999px;
      background:#ffcb05;
      color:#111;
      font-weight:bold;
      cursor:pointer;
      margin-top:15px;
    ">
    登出
  </button>

</header>

<section class="admin-section">

  <input id="name" placeholder="商品名稱">
  <input id="description" placeholder="商品描述">
  <input id="price" type="number" placeholder="價格">
  <input id="image_url" placeholder="圖片檔名">

  <button onclick="addProduct()">新增商品</button>

  <p id="status"></p>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
async function checkLogin() {
  const { data } = await supabaseClient.auth.getSession();

  if (!data.session) {
    window.location.href = "login.html";
    return;
  }
}

async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

async function addProduct() {
  const name = document.getElementById("name").value;
  const description = document.getElementById("description").value;
  const price = Number(document.getElementById("price").value);
  const image_url = document.getElementById("image_url").value;
  const status = document.getElementById("status");

  const { error } = await supabaseClient
    .from("products")
    .insert([
      {
        name: name,
        description: description,
        price: price,
        image_url: image_url
      }
    ]);

  if (error) {
    status.textContent = "新增失敗：" + error.message;
    return;
  }

  status.textContent = "新增成功！";

  document.getElementById("name").value = "";
  document.getElementById("description").value = "";
  document.getElementById("price").value = "";
  document.getElementById("image_url").value = "";
}

checkLogin();
</script>

</body>
</html>
