<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購物車 | SparrowUPinkHen PTCG</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <nav class="navbar">
    <a href="index.html">首頁</a>
    <a href="gradedcard.html">鑑定卡區</a>
    <a href="rawcard.html">裸卡區</a>
    <a href="cart.html">購物車</a>
    <a href="auction.html">競標區</a>
    <a href="about.html">關於我們</a>
  </nav>

  <h1>購物車</h1>
  <p class="slogan">Confirm Your Order.</p>
</header>

<section class="cart-section">

  <div id="cart-items"></div>

  <h2 id="total-price"></h2>

  <h2>聯絡資料</h2>

  <input id="customer_name" placeholder="真實姓名（必填）">
  <input id="line_id" placeholder="LINE ID（必填，請確認開起允許搜尋）">
  <input id="phone" placeholder="電話（選填）">
  <input id="email" placeholder="Email（選填）">
  <textarea id="note" placeholder="備註"></textarea>

  <button onclick="submitOrder()">送出訂單</button>

  <p id="status"></p>

</section>

<footer>
  <p>© SparrowUPinkHen PTCG</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
function loadCart() {
  const cartItems = JSON.parse(localStorage.getItem("cart")) || [];
  const cartBox = document.getElementById("cart-items");
  const totalBox = document.getElementById("total-price");

  if (cartItems.length === 0) {
    cartBox.innerHTML = "<p>購物車目前是空的。</p>";
    totalBox.textContent = "";
    return;
  }

  cartBox.innerHTML = "";

  let total = 0;

  cartItems.forEach((item, index) => {
    const price = Number(item.price) || 0;
    total += price;

    const priceText =
      price > 0
        ? `NT$${price}`
        : "價格請洽詢";

    cartBox.innerHTML += `
      <div class="cart-item">
        <img src="images/${item.image_url}" alt="${item.name}">

        <div class="cart-info">
          <h3>${item.name}</h3>
          <p>${item.type || ""}</p>
          <p>${item.description || ""}</p>
          <strong>${priceText}</strong>
        </div>

        <button onclick="removeItem(${index})">移除</button>
      </div>
    `;
  });

  totalBox.textContent =
    total > 0
      ? `總金額：NT$${total}`
      : "總金額：請洽詢";
}

function removeItem(index) {
  const cartItems = JSON.parse(localStorage.getItem("cart")) || [];
  cartItems.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cartItems));
  loadCart();
}

async function submitOrder() {
  const cartItems = JSON.parse(localStorage.getItem("cart")) || [];
  const status = document.getElementById("status");

  if (cartItems.length === 0) {
    status.textContent = "購物車是空的。";
    return;
  }

  const customer_name = document.getElementById("customer_name").value.trim();
  const line_id = document.getElementById("line_id").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const note = document.getElementById("note").value;

  // ⚡ 防禦1：姓名和 LINE ID 必填檢查
  if (!customer_name || !line_id) {
    status.textContent = "❌ 請完整填寫姓名與 LINE ID！";
    alert("🚨 填寫不完整！為了後續聯繫交貨，請務必留下您的姓名與 LINE ID 唷！");
    return;
  }

  // ⚡ 防禦2：LINE ID 長度過濾
  if (line_id.length < 4) {
    status.textContent = "❌ LINE ID 格式不正確（太短）";
    alert("🚨 訂單送出失敗！請輸入正確的 LINE ID 唷！");
    return;
  }

  // ⚡ 防禦3：檢查 LINE ID 是否包含中文字
  const chineseRegex = /[\u4e00-\u9fa5]/;
  if (chineseRegex.test(line_id)) {
    status.textContent = "❌ LINE ID 不能含有中文字";
    alert("🚨 訂單送出失敗！LINE ID 不可能含有中文字，請填寫正確的 ID 或電話號碼！");
    return;
  }

  // ⚡ 防禦4：下單法律震懾宣導
  const confirmOrder = confirm(
    `📢 【 SparrowUPinkHen 下單確認 】\n\n` +
    `確定要送出訂單購買購物車內的卡片嗎？\n` +
    `⚠️ 請注意：惡意下單填寫假資料、放鳥不回應者，本店將直接公開黑名單並採取法律訴訟，請珍惜個人信用！`
  );
  
  if (!confirmOrder) {
    status.textContent = "已取消送出";
    return;
  }

  const order_items = cartItems
    .map(item => {
      const price = Number(item.price) || 0;
      const priceText = price > 0 ? `NT$${price}` : "價格請洽詢";
      return `${item.type || ""}｜${item.name}｜${priceText}`;
    })
    .join("；");

  const { error } = await supabaseClient
    .from("orders")
    .insert([
      {
        customer_name,
        email,
        phone,
        line_id,
        note,
        order_items
      }
    ]);

  if (error) {
    console.log(error);
    status.textContent = "訂單送出失敗。";
    return;
  }

  localStorage.removeItem("cart");
  status.textContent = "訂單已送出！我會盡快與你聯繫。";
  loadCart();
}

loadCart();
</script>

</body>
</html>
