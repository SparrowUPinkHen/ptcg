<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寄賣審核後台</title>
  <link rel="stylesheet" href="style.css">
  
  <style>
    .contact-btn {
      display: inline-block;
      color: white !important;
      padding: 6px 14px;
      border-radius: 4px;
      border: none;
      font-weight: bold;
      font-size: 14px;
      margin: 5px 0 15px 0;
      transition: opacity 0.2s;
      cursor: pointer;
    }
    .contact-btn:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

<header class="header">

  <h1>寄賣審核後台</h1>

  <p class="slogan">
    Consignment Review
  </p>

  <button
    onclick="logout()"
    style="
      padding:12px 25px;
      border:none;
      border-radius:999px;
      background:#ffcb05;
      color:#111;
      font-weight:bold;
      cursor:pointer;
      margin-top:15px;
    ">
    登出
  </button>

</header>

<section class="product">
  <div id="review-list" class="product-grid"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function checkLogin() {
  const { data } = await supabaseClient.auth.getSession();

  if (!data.session) {
    window.location.href = "login.html";
    return;
  }

  loadRequests();
}

async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

async function loadRequests() {
  const container = document.getElementById("review-list");

  const { data, error } = await supabaseClient
    .from("consignment_requests")
    .select("*")
    .order("created_at", {
      ascending: false
    });

  if (error) {
    console.log(error);
    container.innerHTML = "<p>讀取失敗。</p>";
    return;
  }

  container.innerHTML = "";

  data.forEach(card => {
    
    // 🎯 五合一大腦判斷邏輯：新增 EMAIL 判斷與顏色設定
    const contactUrl = card.line_id || "";
    let btnText = "💬 聯絡賣家";
    let btnBgColor = "#666"; // 預設灰色

    if (contactUrl.includes("line.me")) {
      btnText = "💬 LINE 聯絡";
      btnBgColor = "#06C755"; // LINE 官方綠
    } else if (contactUrl.includes("tel:")) {
      btnText = "📞 撥打手機";
      btnBgColor = "#007AFF"; // 蘋果藍
    } else if (contactUrl.includes("facebook.com")) {
      btnText = "👤 FB 聯絡";
      btnBgColor = "#1877F2"; // 臉書藍
    } else if (contactUrl.includes("instagram.com")) {
      btnText = "📸 IG 聯絡";
      btnBgColor = "#E1306C"; // IG 紅
    } else if (contactUrl.includes("mailto:")) {
      btnText = "✉️ EMAIL 聯絡";
      btnBgColor = "#4A5568"; // EMAIL 鋼鐵灰
    }

    container.innerHTML += `
      <div class="product-card">

        <img
          src="${card.image_url}"
          alt="${card.card_name}">

        <h3>${card.card_name}</h3>

        <p>賣家：${card.seller_name}</p>

        <p>聯絡管道：
          <button onclick="goToContact('${contactUrl}')" class="contact-btn" style="background-color: ${btnBgColor};">
            ${btnText}
          </button>
        </p>

        <p>價格：NT$${card.price || 0}</p>

        <p>備註：${card.description || ""}</p>

        <p>狀態：${card.status}</p>

        <button
          onclick="updateStatus(${card.id}, 'approved')">
          Approve
        </button>

        <button
          onclick="updateStatus(${card.id}, 'rejected')">
          Reject
        </button>

      </div>
    `;
  });
}

// 🎯 點擊按鈕才動態開啟分頁的跳轉功能
function goToContact(url) {
  if (!url) {
    alert("抱歉，該賣家沒有提供有效的聯絡方式。");
    return;
  }
  window.open(url, '_blank');
}

async function updateStatus(id, status) {
  const { error } = await supabaseClient
    .from("consignment_requests")
    .update({
      status: status
    })
    .eq("id", id);

  if (error) {
    console.log(error);
    alert("更新失敗");
    return;
  }

  alert("已更新為 " + status);
  loadRequests();
}

checkLogin();

</script>

</body>
</html>
